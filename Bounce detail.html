%%[
SET @jobid     = RequestParameter("jobid")
SET @eventdate = RequestParameter("eventdate")
]%%

<script runat="server">
Platform.Load("Core","1");

var jobid     = Request.GetQueryStringParameter("jobid")     || "";
var eventdate = Request.GetQueryStringParameter("eventdate") || "";

var allRows   = [];
var errMsg    = "";
var totalRows = 0;

var bounceSubMap   = {};
var bounceOrder    = [];
var bounceEmailMap = {};
var domainMap      = {};
var domainOrder    = [];
var latestDate     = "";
var totalBounces   = 0;

function safeStr(v){
    if(v === null || v === undefined) return "";
    return String(v).replace(/^\s+|\s+$/g, "");
}

function getDomain(email){
    var e = safeStr(email);
    if(!e || e.indexOf("@") === -1) return "unknown";
    return safeStr(e.split("@")[1]).toLowerCase();
}

if(jobid){
    try{
        // TODO: Replace with your Bounce Detail DE name
        var de = DataExtension.Init("YOUR_BOUNCE_DETAIL_DE_NAME");
        var filter = {Property:"JobID", SimpleOperator:"equals", Value: jobid};

        allRows   = de.Rows.Retrieve(filter);
        totalRows = allRows ? allRows.length : 0;

        if(allRows){
            for(var i = 0; i < allRows.length; i++){
                var r     = allRows[i];
                var cat   = safeStr(r.BounceSubcategory) || "Unknown";
                var email = safeStr(r.EmailAddress);
                var dom   = getDomain(email);
                var dt    = safeStr(r.EventDate);

                totalBounces++;

                if(dt && (!latestDate || dt > latestDate)) latestDate = dt;

                if(typeof bounceSubMap[cat] === "undefined"){
                    bounceSubMap[cat] = 0;
                    bounceOrder.push(cat);
                    bounceEmailMap[cat] = [];
                }
                bounceSubMap[cat]++;
                if(email) bounceEmailMap[cat].push(email);

                if(typeof domainMap[dom] === "undefined"){
                    domainMap[dom] = 0;
                    domainOrder.push(dom);
                }
                domainMap[dom]++;
            }
            domainOrder.sort(function(a,b){ return domainMap[b] - domainMap[a]; });
        }

    }catch(e){
        errMsg = String(e);
    }
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bounce Detail Report</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
    --bg:       #0f1117;
    --surface:  #181c27;
    --surface2: #1e2333;
    --border:   #2a2f42;
    --accent:   #3b82f6;
    --accent2:  #6366f1;
    --success:  #10b981;
    --warning:  #f59e0b;
    --danger:   #ef4444;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --radius:   10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; font-size: 14px;
}
.header {
    background: linear-gradient(135deg, var(--surface) 0%, #1a1f35 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 28px; display: flex;
    align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
}
.header-left { display: flex; align-items: center; gap: 12px; }
.header-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--danger), #f97316);
    border-radius: 9px; display: flex;
    align-items: center; justify-content: center; font-size: 18px;
}
.header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 17px; font-weight: 600;
    letter-spacing: 0.04em; color: var(--text);
}
.header span { font-size: 12px; color: var(--muted); margin-top: 2px; display: block; }
.header-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.back-btn {
    padding: 8px 18px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 7px;
    color: var(--text); font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer;
    text-decoration: none; transition: border-color .2s, background .2s;
    display: inline-flex; align-items: center; gap: 6px;
}
.back-btn:hover { border-color: var(--accent); background: #1e2843; }
.dl-btn {
    padding: 8px 18px;
    background: linear-gradient(135deg, var(--success), #059669);
    border: none; border-radius: 7px;
    color: #fff; font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer;
    display: inline-flex; align-items: center; gap: 7px;
    transition: opacity .2s, transform .15s;
}
.dl-btn:hover  { opacity: .88; transform: translateY(-1px); }
.dl-btn:active { transform: translateY(0); }
.dl-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
.container { padding: 24px 28px; max-width: 1400px; }
.card-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; font-weight: 600;
    letter-spacing: .12em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 14px;
}
.meta-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 22px; }
.meta-chip {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 7px; padding: 8px 14px; font-size: 12px; color: var(--muted);
}
.meta-chip strong {
    font-family: 'IBM Plex Mono', monospace; color: var(--accent); font-size: 13px;
}
.summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 14px; margin-bottom: 28px;
}
.stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px;
    position: relative; overflow: hidden; transition: border-color .2s;
}
.stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--danger), #f97316);
    opacity: 0; transition: opacity .2s;
}
.stat-card:hover { border-color: var(--danger); }
.stat-card:hover::before { opacity: 1; }
.stat-label {
    font-size: 10px; font-weight: 600; letter-spacing: .1em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
}
.stat-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px; font-weight: 600; color: var(--danger); line-height: 1;
}
.stat-value.accent { color: var(--accent); }
.stat-value.total  { color: #f97316; }
.table-section { margin-bottom: 28px; }
.table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
.agg-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.agg-table th {
    background: #1a1f35; color: var(--muted);
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .08em; padding: 12px 16px;
    text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap;
}
.agg-table td {
    padding: 16px; border-bottom: 1px solid var(--border); vertical-align: top;
}
.agg-table tr:last-child td { border-bottom: none; }
.agg-table tbody tr:hover { background: var(--surface2); }
.mono { font-family: 'IBM Plex Mono', monospace; font-size: 12px; }
.bounce-list { display: flex; flex-direction: column; gap: 6px; }
.bounce-item { display: flex; align-items: center; gap: 8px; }
.bounce-pill {
    display: inline-block; padding: 3px 10px; border-radius: 5px;
    font-size: 11px; font-weight: 600;
    background: rgba(239,68,68,0.15); color: #fca5a5;
    border: 1px solid rgba(239,68,68,0.3);
    white-space: nowrap; min-width: 120px; text-align: center;
}
.bounce-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px; font-weight: 600; color: var(--danger); min-width: 28px;
}
.bounce-bar-wrap { flex: 1; min-width: 80px; max-width: 140px; }
.bounce-bar-bg { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.bounce-bar-fill { height: 100%; background: var(--danger); border-radius: 3px; }
.cell-header {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .08em; color: var(--muted); margin-bottom: 10px;
}
.email-section { margin-top: 32px; }
.subcat-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
}
.subcat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    background: #1a1f35;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
}
.subcat-header:hover { background: #1e2540; }
.subcat-title { display: flex; align-items: center; gap: 10px; }
.subcat-pill {
    display: inline-block; padding: 3px 12px; border-radius: 5px;
    font-size: 12px; font-weight: 600;
    background: rgba(239,68,68,0.15); color: #fca5a5;
    border: 1px solid rgba(239,68,68,0.3);
}
.subcat-count-badge {
    background: var(--danger);
    color: #fff;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; font-weight: 600;
    padding: 2px 10px; border-radius: 20px;
}
.subcat-toggle {
    font-size: 12px; color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    transition: transform .2s;
}
.subcat-body { padding: 0; overflow: hidden; }
.email-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 0;
}
.email-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 18px;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    transition: background .15s;
}
.email-row:hover { background: var(--surface2); }
.email-index {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; color: var(--muted); min-width: 24px;
}
.email-address {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px; color: var(--text); word-break: break-all;
}
.email-domain-tag {
    font-size: 10px; color: var(--muted);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 6px;
    white-space: nowrap; margin-left: auto;
}
.empty-state {
    padding: 48px; text-align: center; color: var(--muted);
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
}
.empty-state .icon { font-size: 36px; margin-bottom: 10px; }
.empty-state p { font-size: 14px; }
@media (max-width: 768px) {
    .container { padding: 16px; }
    .agg-table { min-width: 700px; }
    .email-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <div class="header-icon">⚠️</div>
        <div>
            <h1>Bounce Detail Report</h1>
            <span>Salesforce Marketing Cloud · Bounce Analysis</span>
        </div>
    </div>
    <div class="header-actions">
        <button class="dl-btn" id="dlBtn" onclick="downloadCSV()">⬇ Download CSV</button>
        <a href="YOUR_TRACKING_REPORT_CLOUDPAGE_URL" class="back-btn">← Back to Tracking Report</a>
    </div>
</div>

<div class="container">

<script runat="server">
if(!jobid){
    Write('<div class="empty-state"><div class="icon">🔎</div><p>No Job ID provided. Please access this page from the Email Tracking Report.</p></div>');
    Write('<script>var REPORT_DATA = null;<\/script>');
} else if(errMsg){
    Write('<div class="empty-state"><div class="icon">⚠️</div><p>Error: ' + errMsg + '</p></div>');
    Write('<script>var REPORT_DATA = null;<\/script>');
} else if(totalRows === 0){
    Write('<div class="empty-state"><div class="icon">✅</div><p>No bounce records found for Job ID <strong>' + jobid + '</strong>.</p></div>');
    Write('<script>var REPORT_DATA = null;<\/script>');
} else {

    var displayDate = latestDate || eventdate || "";

    var jsObj = 'var REPORT_DATA = {';
    jsObj += '"jobId":"'        + jobid            + '",';
    jsObj += '"eventDate":"'    + displayDate      + '",';
    jsObj += '"totalBounces":'  + totalBounces     + ',';
    jsObj += '"bounceTypes":'   + bounceOrder.length + ',';
    jsObj += '"uniqueDomains":' + domainOrder.length + ',';

    jsObj += '"subcategories":[';
    for(var g = 0; g < bounceOrder.length; g++){
        var cat = bounceOrder[g];
        var cnt = bounceSubMap[cat];
        var pct = totalBounces > 0 ? ((cnt / totalBounces) * 100).toFixed(1) : "0.0";
        var safeCat = cat.replace(/\\/g,"\\\\").replace(/"/g,'\\"');
        if(g > 0) jsObj += ',';
        jsObj += '{"name":"' + safeCat + '","count":' + cnt + ',"pct":"' + pct + '"}';
    }
    jsObj += '],';

    jsObj += '"emails":[';
    var firstEmail = true;
    for(var g = 0; g < bounceOrder.length; g++){
        var cat    = bounceOrder[g];
        var safeCat = cat.replace(/\\/g,"\\\\").replace(/"/g,'\\"');
        var emails = bounceEmailMap[cat];
        for(var e = 0; e < emails.length; e++){
            var emailVal = emails[e];
            var domVal   = getDomain(emailVal);
            var safeEmail = emailVal.replace(/\\/g,"\\\\").replace(/"/g,'\\"');
            var safeDom   = domVal.replace(/\\/g,"\\\\").replace(/"/g,'\\"');
            if(!firstEmail) jsObj += ',';
            jsObj += '{"email":"' + safeEmail + '","domain":"' + safeDom + '","subcategory":"' + safeCat + '"}';
            firstEmail = false;
        }
    }
    jsObj += ']';
    jsObj += '};';

    Write('<script>' + jsObj + '<\/script>');

    Write('<div class="meta-bar">');
    Write('<div class="meta-chip">Job ID: <strong>' + jobid + '</strong></div>');
    Write('<div class="meta-chip">Event Date: <strong>' + displayDate + '</strong></div>');
    Write('<div class="meta-chip">Total Bounce Records: <strong>' + totalBounces + '</strong></div>');
    Write('<div class="meta-chip">Unique Bounce Types: <strong>' + bounceOrder.length + '</strong></div>');
    Write('<div class="meta-chip">Unique Domains: <strong>' + domainOrder.length + '</strong></div>');
    Write('</div>');

    Write('<div class="card-label">Bounce Summary</div>');
    Write('<div class="summary-grid">');
    Write('<div class="stat-card"><div class="stat-label">Total Bounces</div><div class="stat-value total">' + totalBounces + '</div></div>');
    for(var g = 0; g < bounceOrder.length; g++){
        var cat   = bounceOrder[g];
        var count = bounceSubMap[cat];
        Write('<div class="stat-card"><div class="stat-label">' + cat + '</div><div class="stat-value">' + count + '</div></div>');
    }
    Write('</div>');

    var maxBounce = 0;
    for(var g = 0; g < bounceOrder.length; g++){
        if(bounceSubMap[bounceOrder[g]] > maxBounce) maxBounce = bounceSubMap[bounceOrder[g]];
    }

    Write('<div class="table-section">');
    Write('<div class="card-label">Aggregated Bounce Summary — Job ID ' + jobid + '</div>');
    Write('<div class="table-wrap">');
    Write('<table class="agg-table">');
    Write('<thead><tr>');
    Write('<th style="min-width:110px;">Job ID</th>');
    Write('<th style="min-width:140px;">Event Date</th>');
    Write('<th>Bounce Subcategories (Total: ' + totalBounces + ')</th>');
    Write('</tr></thead>');
    Write('<tbody><tr>');
    Write('<td><span class="mono" style="color:var(--accent);font-size:13px;font-weight:600;">' + jobid + '</span></td>');
    Write('<td><span class="mono" style="font-size:12px;">' + displayDate + '</span></td>');
    Write('<td>');
    Write('<div class="cell-header">Bounce Type &rarr; Count</div>');
    Write('<div class="bounce-list">');
    for(var g = 0; g < bounceOrder.length; g++){
        var cat  = bounceOrder[g];
        var cnt  = bounceSubMap[cat];
        var bPct = maxBounce > 0 ? Math.round((cnt / maxBounce) * 100) : 0;
        var sPct = totalBounces > 0 ? ((cnt / totalBounces) * 100).toFixed(1) : "0.0";
        Write('<div class="bounce-item">');
        Write('<div class="bounce-pill">' + cat + '</div>');
        Write('<div class="bounce-count">' + cnt + '</div>');
        Write('<div style="font-size:11px;color:var(--muted);min-width:38px;">' + sPct + '%</div>');
        Write('<div class="bounce-bar-wrap"><div class="bounce-bar-bg"><div class="bounce-bar-fill" style="width:' + bPct + '%;"></div></div></div>');
        Write('</div>');
    }
    Write('</div></td></tr></tbody></table>');
    Write('</div></div>');

    Write('<div class="email-section">');
    Write('<div class="card-label">Email Addresses by Bounce Subcategory</div>');

    for(var g = 0; g < bounceOrder.length; g++){
        var cat    = bounceOrder[g];
        var emails = bounceEmailMap[cat];
        var cnt    = bounceSubMap[cat];
        var blockId = 'block_' + g;

        Write('<div class="subcat-block">');
        Write('<div class="subcat-header" onclick="toggleBlock(\'' + blockId + '\')">');
        Write('<div class="subcat-title">');
        Write('<div class="subcat-pill">' + cat + '</div>');
        Write('<span class="subcat-count-badge">' + cnt + ' email' + (cnt !== 1 ? 's' : '') + '</span>');
        Write('</div>');
        Write('<span class="subcat-toggle" id="toggle_' + blockId + '">&#9660; collapse</span>');
        Write('</div>');

        Write('<div class="subcat-body" id="' + blockId + '">');
        Write('<div class="email-grid">');
        for(var e = 0; e < emails.length; e++){
            var emailVal = emails[e];
            var domVal   = getDomain(emailVal);
            Write('<div class="email-row">');
            Write('<span class="email-index">' + (e + 1) + '</span>');
            Write('<span class="email-address">' + emailVal + '</span>');
            Write('<span class="email-domain-tag">@' + domVal + '</span>');
            Write('</div>');
        }
        Write('</div></div></div>');
    }

    Write('</div>');
}
</script>

</div><!-- /container -->

<script>

function toggleBlock(id){
    var body   = document.getElementById(id);
    var toggle = document.getElementById('toggle_' + id);
    if(!body) return;
    if(body.style.display === 'none'){
        body.style.display = 'block';
        if(toggle) toggle.innerHTML = '&#9660; collapse';
    } else {
        body.style.display = 'none';
        if(toggle) toggle.innerHTML = '&#9658; expand';
    }
}

function toCSVCell(val){
    var s = (val === null || val === undefined) ? '' : String(val);
    if(s.indexOf(',') !== -1 || s.indexOf('"') !== -1 || s.indexOf('\n') !== -1 || s.indexOf('\r') !== -1){
        s = '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
}

function buildCSV(d){
    var lines = [];
    lines.push('BOUNCE DETAIL REPORT');
    lines.push('');
    lines.push('METADATA');
    lines.push(['Job ID','Event Date','Total Bounces','Unique Bounce Types','Unique Domains'].map(toCSVCell).join(','));
    lines.push([d.jobId, d.eventDate, d.totalBounces, d.bounceTypes, d.uniqueDomains].map(toCSVCell).join(','));
    lines.push('');
    lines.push('BOUNCE SUBCATEGORY SUMMARY');
    lines.push(['Bounce Subcategory','Count','Percentage'].map(toCSVCell).join(','));
    for(var i = 0; i < d.subcategories.length; i++){
        var s = d.subcategories[i];
        lines.push([s.name, s.count, s.pct + '%'].map(toCSVCell).join(','));
    }
    lines.push('');
    lines.push('EMAIL ADDRESS BREAKDOWN');
    lines.push(['#','Email Address','Domain','Bounce Subcategory'].map(toCSVCell).join(','));
    for(var j = 0; j < d.emails.length; j++){
        var em = d.emails[j];
        lines.push([j + 1, em.email, em.domain, em.subcategory].map(toCSVCell).join(','));
    }
    return lines.join('\r\n');
}

function downloadCSV(){
    var btn = document.getElementById('dlBtn');
    if(!window.REPORT_DATA){
        alert('No report data available to export.');
        return;
    }
    btn.disabled    = true;
    btn.textContent = 'Building...';
    var csv      = buildCSV(window.REPORT_DATA);
    var dateStr  = new Date().toISOString().slice(0,10);
    var filename = 'BounceReport_' + window.REPORT_DATA.jobId + '_' + dateStr + '.csv';
    var blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href        = url;
    a.download    = filename;
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    btn.disabled    = false;
    btn.textContent = '\u2B07 Download CSV';
}
</script>

</body>
</html>
